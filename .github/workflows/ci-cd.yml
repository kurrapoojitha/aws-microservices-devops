name: CI-CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Node version
        run: node -v

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm install; else echo "No package.json found, skipping"; fi

      - name: Run tests
        run: |
          if npm run | grep test; then npm test; else echo "No tests found, skipping"; fi











































































































































































































































































   
      
  





  
    


    
        

     
     

    
   
