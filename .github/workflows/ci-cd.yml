

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
name: Full CI-CD Pipeline
on:
  push:
    branches:
      - aws-microservices-devops
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
    # STEP 1: Checkout
    - name: Checkout Code
      uses: actions/checkout@v4

    # STEP 2: Docker Login
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # STEP 3: Build Image
    - name: Build Docker Image
      run: docker build -t kurrapoojitha/devops-app:latest .

    # STEP 4: Push Image
    - name: Push Docker Image
      run: docker push kurrapoojitha/devops-app:latest

    # STEP 5: Security Scan (Trivy)
    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: kurrapoojitha/devops-app:latest
        format: table
        exit-code: 0

    # STEP 6: Setup Kubeconfig (for EKS)
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: us-east-1

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name my-cluster --region us-east-1

    # STEP 7: Deploy to Kubernetes
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f deployment.yaml
        kubectl rollout status deployment/devops-app

    # STEP 8: Verify Deployment
    - name: Verify Pods
      run: kubectl get pods

    # STEP 9: Setup Monitoring (Prometheus)
    - name: Install Monitoring
      run: |
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update
        helm upgrade --install prometheus prometheus-community/kube-prometheus-stack --namespace monitoring --create-namespace





































































   
      
  





  
    


    
        

     
     

    
   
