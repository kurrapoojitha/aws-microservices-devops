apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
      version: v2
  template:
    metadata:
      labels:
        app: devops-app
        version: v2
    spec:
      containers:
      - name: devops-container
        image: your-dockerhub-username/devops-app:v2
        ports:
        - containerPort: 80
