apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
      version: v1
  template:
    metadata:
      labels:
        app: devops-app
        version: v1
    spec:
      containers:
      - name: devops-container
        image: kurrapoojitha/devops-app:latest
        ports:
        - containerPort: 80
